<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background: linear-gradient(to bottom,#0f2027,#203a43,#2c5364);
color:white;
font-family:'Poppins',sans-serif;
overflow-x:hidden;
text-align:center;
}

/* Tap Screen */
#tapScreen{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(to top,#141e30,#243b55);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
flex-direction:column;
animation:cloudOpen 2s ease forwards;
}

#tapScreen h1{
font-family:'Great Vibes',cursive;
font-size:38px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{opacity:0.6}
50%{opacity:1}
100%{opacity:0.6}
}

@keyframes cloudOpen{
0%{clip-path:circle(0% at 50% 50%)}
100%{clip-path:circle(150% at 50% 50%)}
}

/* Floating Hearts */
.heart{
position:fixed;
bottom:-20px;
color:pink;
font-size:20px;
animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

/* Lyrics */
#lyrics{
font-family:'Great Vibes',cursive;
font-size:32px;
margin-top:50px;
white-space:pre-line;
}

/* Notes */
.note{
max-width:750px;
margin:40px auto;
padding:35px;
font-size:20px;
line-height:1.8;
background:rgba(255,255,255,0.1);
border-radius:20px;
backdrop-filter:blur(8px);
opacity:0;
transition:opacity 1s;
}

/* Question */
#question{
margin-top:50px;
opacity:0;
transition:opacity 1s;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yesBtn{
background:#ff4b7d;
color:white;
}

#noBtn{
background:white;
color:#ff4b7d;
position:relative;
}

/* Mobile */
@media(max-width:600px){

#lyrics{
font-size:26px;
padding:10px;
}

.note{
font-size:18px;
padding:25px;
}

button{
width:80%;
max-width:280px;
}

}

</style>
</head>

<body>

<div id="tapScreen">
<h1>Tap to Open 💌</h1>
<p>For Someone Very Special ❤️</p>
</div>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div id="lyrics"></div>

<div id="note1" class="note"></div>
<div id="note2" class="note"></div>

<div id="question">
<h2>Do you accept my sorry? 💖</h2>
<button id="yesBtn">Yes ❤️</button>
<button id="noBtn">No 💔</button>
</div>

<script>

const tapScreen=document.getElementById("tapScreen");
const music=document.getElementById("bgMusic");

tapScreen.addEventListener("click",function(){
tapScreen.style.display="none";
music.play();
startExperience();
});

/* Floating hearts */
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,600);

/* Typing function */
function typeText(element,text,speed,callback){
let i=0;
element.style.opacity=1;
function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i);
i++;
window.scrollTo(0,document.body.scrollHeight);
setTimeout(typing,speed);
}else{
if(callback) callback();
}
}
typing();
}

function startExperience(){

const lyricsText=`✨🌙 Hmmm… hmmm… 🌙✨

Dehleez pe mere dil ki ❤️🚪
Jo rakhe hain tune kadam 👣💫
Tere naam pe meri zindagi 📝💕
Likh di, mere humdum 💖🌹

Haan sikha maine jeena… jeena kaise jeena 🌸✨
Na sikha jeena tere bina, humdum 💔🌌

🌹 Tum ho toh zindagi hai… tum nahi toh bas khamoshi hai. 🌹`;

typeText(document.getElementById("lyrics"),lyricsText,40,function(){

const note1=`I know mere bachpana ki wajah se tum kaafi pareshan ho gayi ho... 😔
I’ve realized ki sirf 'sorry' bolne se kuch nahi hoga.
Mujhe apne actions se prove karna padega. 🛠️`;

typeText(document.getElementById("note1"),note1,40,function(){

const note2=`Main sach mein apne aap ko change kar raha hoon — not just for us, but for myself too. 🧘‍♂️
I really value you in my life.
Please mujhe bas ek mauka do to show you this new version of me. ⏳
Let’s not end everything like this... please stay with me? 💞`;

typeText(document.getElementById("note2"),note2,40,function(){
document.getElementById("question").style.opacity=1;
});

});
});

}

/* Running No button */
const noBtn=document.getElementById("noBtn");

function moveNo(){
noBtn.style.position="absolute";
let x=Math.random()*(window.innerWidth-120);
let y=Math.random()*(window.innerHeight-60);
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

/* Yes button */
document.getElementById("yesBtn").addEventListener("click",function(){
alert("Thank you for giving me another chance ❤️");
});

</script>

</body>
</html>
